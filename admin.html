<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LINKify</title>
  <link rel="icon" href="logo-linkify.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="toast"></div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-logo">
        <img src="logo-linkify.png" alt="L" onerror="this.parentElement.innerHTML='<span style=color:#fff;font-weight:800;font-size:16px>L</span>'">
      </div>
      <div class="sb-name">LINK<span>ify</span></div>
    </div>
    <div class="sb-user">
      <div class="sb-user-name" id="sb-email">...</div>
      <div>Dashboard Toko</div>
    </div>
  </div>

  <div class="sb-nav">
    <div class="sb-label">Menu</div>
    <button class="sb-btn active" data-tab="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="sb-btn" data-tab="products">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Produk
    </button>
    <button class="sb-btn" data-tab="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Pengaturan Toko
    </button>
    <button class="sb-btn" data-tab="account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Keamanan Akun
    </button>
    <hr class="sb-divider">
    <button class="sb-btn" id="btn-copy-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Copy Link Toko
    </button>
    <hr class="sb-divider">
    <button class="sb-btn danger" id="btn-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Keluar
    </button>
  </div>
  <div class="sb-bottom">
    <div class="sb-copy">LINKify &copy; 2025</div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="btn-hamburger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
    </div>
    <div class="topbar-right">
      <div class="badge-time" id="clock-time">--:--</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="page active">
      <div class="clock-card">
        <div>
          <div class="clock-time" id="clock-big">--:--:--</div>
          <div class="clock-date" id="clock-date">Memuat...</div>
        </div>
        <div class="clock-right">
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Link toko kamu</div>
          <button class="btn-copy-link" id="btn-copy-link-2">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy Link
          </button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card orange">
          <div class="stat-icon orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
          </div>
          <div class="stat-label">Total Produk</div>
          <div class="stat-val" id="stat-total">—</div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon red">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="stat-label">Stok Habis</div>
          <div class="stat-val" id="stat-empty">—</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div class="stat-label">Login Sebagai</div>
          <div class="stat-val" style="font-size:13px;font-weight:600;margin-top:4px;" id="stat-email">—</div>
        </div>
      </div>
    </div>

    <!-- PRODUK -->
    <div id="tab-products" class="page">
      <div class="prod-header">
        <h2 style="font-size:18px;font-weight:800">Daftar Produk</h2>
        <button class="btn btn-dark" id="btn-add-product">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Tambah Produk
        </button>
      </div>
      <div class="prod-grid" id="products-list">
        <div class="skel-card"><div class="skel" style="height:140px"></div><div style="padding:12px"><div class="skel" style="height:12px;width:70%;margin-bottom:8px"></div><div class="skel" style="height:14px;width:45%"></div></div></div>
        <div class="skel-card"><div class="skel" style="height:140px"></div><div style="padding:12px"><div class="skel" style="height:12px;width:55%;margin-bottom:8px"></div><div class="skel" style="height:14px;width:40%"></div></div></div>
        <div class="skel-card"><div class="skel" style="height:140px"></div><div style="padding:12px"><div class="skel" style="height:12px;width:80%;margin-bottom:8px"></div><div class="skel" style="height:14px;width:50%"></div></div></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="tab-settings" class="page">
      <h2 style="font-size:18px;font-weight:800;margin-bottom:18px">Pengaturan Toko</h2>
      <div class="card f-section">
        <div class="f-group">
          <label class="f-label">Nama Toko</label>
          <input id="inp-username" type="text" class="f-input" placeholder="Nama toko kamu...">
        </div>
        <div class="f-group">
          <label class="f-label">Bio / Deskripsi</label>
          <textarea id="inp-bio" class="f-area" rows="3" placeholder="Ceritakan tentang tokomu..."></textarea>
        </div>
        <div class="f-row">
          <div class="f-group">
            <label class="f-label">Link WhatsApp</label>
            <input id="inp-wa" type="text" class="f-input" placeholder="https://wa.me/628...">
          </div>
          <div class="f-group">
            <label class="f-label">Link Shopee</label>
            <input id="inp-shopee" type="text" class="f-input" placeholder="https://shopee.co.id/...">
          </div>
        </div>
        <div class="f-group">
          <label class="f-label">Logo Toko</label>
          <div class="logo-row">
            <img id="logo-preview" src="https://placehold.co/200x200/F3F4F6/AAA?text=Logo" alt="Logo" class="logo-prev">
            <button type="button" id="btn-logo-pick" class="btn btn-dark" style="font-size:13px;padding:9px 16px">Pilih Foto</button>
            <input type="file" id="inp-logo-file" accept="image/*" style="display:none">
            <input type="hidden" id="inp-logo-url">
          </div>
        </div>
        <button class="btn btn-dark btn-full" id="btn-save-settings">Simpan Pengaturan</button>
      </div>
    </div>

    <!-- AKUN -->
    <div id="tab-account" class="page">
      <h2 style="font-size:18px;font-weight:800;margin-bottom:18px">Keamanan Akun</h2>
      <div class="card f-section">
        <div class="f-group">
          <label class="f-label">Email Baru</label>
          <input id="inp-new-email" type="email" class="f-input">
        </div>
        <div class="f-group">
          <label class="f-label">Password Baru <span style="color:var(--muted);font-weight:400;text-transform:none;font-size:12px">(kosong = tidak ganti)</span></label>
          <input id="inp-new-pass" type="password" class="f-input" placeholder="Min. 6 karakter">
        </div>
        <div class="f-group">
          <label class="f-label" style="color:var(--danger)">Password Lama (wajib)</label>
          <input id="inp-old-pass" type="password" class="f-input" placeholder="Verifikasi identitas kamu">
        </div>
        <button class="btn btn-dark btn-full" id="btn-save-account">Update Akun</button>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- MODAL PRODUK -->
<div id="product-modal" class="modal-bg">
  <div class="modal-box">
    <div class="modal-pull" id="modal-pull"></div>
    <div class="modal-title" id="modal-title">Tambah Produk</div>
    <form id="product-form" onsubmit="return false">
      <input type="hidden" id="inp-prod-id">
      <div class="f-group">
        <label class="f-label">Nama Produk *</label>
        <input id="inp-prod-name" type="text" class="f-input" required placeholder="Nama produk...">
      </div>
      <div class="f-row">
        <div class="f-group">
          <label class="f-label">Harga (Rp) *</label>
          <input id="inp-prod-price" type="number" class="f-input" required min="0" placeholder="0">
        </div>
        <div class="f-group">
          <label class="f-label">Stok *</label>
          <input id="inp-prod-stock" type="number" class="f-input" required min="0" placeholder="0">
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">Deskripsi</label>
        <textarea id="inp-prod-desc" class="f-area" rows="2" placeholder="Deskripsi singkat produk..."></textarea>
      </div>
      <div class="f-row">
        <div class="f-group">
          <label class="f-label">Link Shopee <span style="font-weight:400;text-transform:none">(opsional)</span></label>
          <input id="inp-prod-shopee" type="text" class="f-input" placeholder="https://shopee.co.id/...">
        </div>
        <div class="f-group">
          <label class="f-label">Link WA Khusus <span style="font-weight:400;text-transform:none">(opsional)</span></label>
          <input id="inp-prod-wa" type="text" class="f-input" placeholder="https://wa.me/628...">
        </div>
      </div>
      <div class="f-group">
        <label class="f-label">Foto Produk *</label>
        <div class="upload-zone" id="upload-zone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Klik atau seret foto ke sini
        </div>
        <input type="file" id="inp-prod-file" accept="image/*" style="display:none">
        <input type="hidden" id="inp-prod-img">
        <img id="img-preview" class="img-preview" alt="Preview">
      </div>
      <button type="submit" class="btn btn-dark btn-full" id="btn-save-product">Simpan Produk</button>
    </form>
  </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
