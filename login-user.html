<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — LINKify</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="logo-linkify.png">
  <link rel="apple-touch-icon" href="logo-linkify.png">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #0d0d1a;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,107,53,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(100,80,200,0.12) 0%, transparent 55%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 36px 28px;
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .brand-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; color: white;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(255,107,53,0.35);
    }
    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.45); font-size: 13px; margin-bottom: 28px; }
    .field-label { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .field-wrap { position: relative; margin-bottom: 16px; }
    .field-input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      outline: none;
      transition: all 0.2s ease;
    }
    .field-input::placeholder { color: rgba(255,255,255,0.25); }
    .field-input:focus { border-color: #FF6B35; background: rgba(255,107,53,0.06); box-shadow: 0 0 0 3px rgba(255,107,53,0.15); }
    .btn-login {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #FF6B35, #FF8C35);
      border: none; border-radius: 14px;
      color: white; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 800;
      cursor: pointer; margin-top: 8px;
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 6px 24px rgba(255,107,53,0.35);
      letter-spacing: -0.2px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,107,53,0.5); }
    .btn-login:active { transform: scale(0.97); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg { color: #FF6B6B; font-size: 12px; font-weight: 600; text-align: center; margin-top: 12px; min-height: 18px; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider-text { font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 600; }
    .back-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 13px;
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; color: rgba(255,255,255,0.6);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: all 0.2s ease;
    }
    .back-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.2); }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-logo">L</div>
    <h1>Masuk ke Toko Kamu</h1>
    <p class="subtitle">Kelola produk & pengaturan toko online kamu</p>

    <div class="field-wrap">
      <label class="field-label" for="email">Email</label>
      <input id="email" type="email" placeholder="email@tokokamu.com" class="field-input" autocomplete="email">
    </div>
    <div class="field-wrap">
      <label class="field-label" for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" class="field-input" autocomplete="current-password">
    </div>

    <button id="loginBtn" class="btn-login">Masuk</button>
    <p id="errorMsg" class="error-msg"></p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">atau</span>
      <div class="divider-line"></div>
    </div>

    <a href="index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Kembali ke Beranda
    </a>
  </div>

  <script type="module">
    import { auth } from './js/firebase.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'admin.html'; });

    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    // Enter key support
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    loginBtn.onclick = () => {
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      errorMsg.textContent = '';

      if (!email || !pass) { errorMsg.textContent = 'Email dan password harus diisi.'; return; }

      loginBtn.innerHTML = '<span class="spinner"></span> Memuat...';
      loginBtn.disabled = true;

      signInWithEmailAndPassword(auth, email, pass)
        .then(() => {})
        .catch((err) => {
          console.error(err);
          errorMsg.textContent = 'Email atau password salah. Coba lagi.';
          loginBtn.innerHTML = 'Masuk';
          loginBtn.disabled = false;
        });
    };
  </script>
</body>
</html>
