<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CP Panel — LINKify Admin</title>
  <link rel="icon" href="logo-linkify.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cp-panel.css">
</head>
<body>
<div id="overlay" class="overlay"></div>
<div id="toast"></div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-logo">
        <img src="logo-linkify.png" alt="L" onerror="this.parentElement.innerHTML='<b style=color:#fff>L</b>'">
      </div>
      <div class="sb-name">LINK<span>ify</span></div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-label">CP Panel</div>
    <button class="sb-btn active" data-tab="users">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      Manajemen User
    </button>
    <hr class="sb-divider">
    <a href="admin.html" class="sb-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard Toko
    </a>
    <hr class="sb-divider">
    <button class="sb-btn danger" id="btn-logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </div>
  <div class="sb-bottom"><div class="sb-copy">LINKify CP Panel © 2025</div></div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="btn-hamburger">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <span class="topbar-title">CP Panel — Manajemen User</span>
    </div>
    <div class="badge-time" id="jam">--:--</div>
  </div>

  <div class="content">

    <!-- HALAMAN LOGIN -->
    <div id="page-login" class="page active">
      <div class="login-wrap">
        <div class="login-card">
          <div class="login-logo">
            <img src="logo-linkify.png" alt="L" onerror="this.parentElement.innerHTML='<b style=color:#fff;font-size:18px>L</b>'">
          </div>
          <h2>Login Admin</h2>
          <p>Akses khusus untuk administrator LINKify</p>
          <div class="f-group">
            <label class="f-label">Email Admin</label>
            <input id="adminEmail" type="email" class="f-input" placeholder="admin@email.com" autocomplete="email">
          </div>
          <div class="f-group">
            <label class="f-label">Password</label>
            <input id="adminPass" type="password" class="f-input" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="btn btn-dark btn-full" id="btnLogin">Masuk sebagai Admin</button>
          <div class="err-msg" id="loginErr"></div>
        </div>
      </div>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="page-dashboard" class="page">

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></div>
          <div class="stat-label">Total User</div>
          <div class="stat-val" id="st-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <div class="stat-label">User Aktif</div>
          <div class="stat-val" id="st-aktif">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <div class="stat-label">Diblokir</div>
          <div class="stat-val" id="st-blokir">0</div>
        </div>
      </div>

      <!-- FORM TAMBAH USER -->
      <div class="add-card">
        <h3>➕ Daftarkan User / Toko Baru</h3>
        <div class="add-grid">
          <div class="f-group" style="margin:0">
            <label class="f-label">Nama Toko</label>
            <input id="in-nama" type="text" class="f-input" placeholder="Nama Toko">
          </div>
          <div class="f-group" style="margin:0">
            <label class="f-label">Nama Pemilik</label>
            <input id="in-pemilik" type="text" class="f-input" placeholder="Nama Pemilik">
          </div>
          <div class="f-group" style="margin:0">
            <label class="f-label">Email</label>
            <input id="in-email" type="email" class="f-input" placeholder="email@toko.com">
          </div>
          <div class="f-group" style="margin:0">
            <label class="f-label">Password</label>
            <input id="in-pass" type="password" class="f-input" placeholder="Min 6 karakter">
          </div>
          <button class="btn btn-dark" id="btnDaftar" style="height:42px;white-space:nowrap">+ Daftarkan</button>
        </div>
      </div>

      <!-- TABEL USER -->
      <div class="table-card">
        <div class="table-head">
          <h3>Daftar User Terdaftar</h3>
          <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama Toko</th>
                <th>Pemilik</th>
                <th>Email</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabelUser">
              <tr><td colspan="6" class="empty-row">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div><!-- /page-dashboard -->
  </div><!-- /content -->
</div><!-- /main -->

<script type="module">
  import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    signOut, onAuthStateChanged, browserLocalPersistence, setPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, getDocs, collection,
    updateDoc, deleteDoc, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { CONFIG } from './js/config.js';

  const EMAIL_ADMIN = CONFIG.adminEmail;
  const app  = getApps().length ? getApp() : initializeApp(CONFIG.firebase);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  await setPersistence(auth, browserLocalPersistence).catch(()=>{});

  const $ = id => document.getElementById(id);
  const sidebar = $('sidebar');
  const overlay = $('overlay');
  let isLoggingOut = false;

  // ── CLOCK ───────────────────────────────────────────────────
  setInterval(() => {
    $('jam').textContent = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  }, 1000);
  $('jam').textContent = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  // ── SIDEBAR ─────────────────────────────────────────────────
  const closeSB = () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); };
  $('btn-hamburger').addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
  overlay.addEventListener('click', closeSB);

  // ── TOAST ───────────────────────────────────────────────────
  let _tt;
  function toast(msg, type='ok') {
    const el = $('toast');
    el.textContent = msg;
    el.style.background = type==='ok' ? '#111' : type==='err' ? '#EF4444' : '#F59E0B';
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // ── AUTH STATE ──────────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (isLoggingOut) return;
    if (user && user.email === EMAIL_ADMIN) {
      $('page-login').classList.remove('active');
      $('page-dashboard').classList.add('active');
      loadUsers();
    } else {
      $('page-login').classList.add('active');
      $('page-dashboard').classList.remove('active');
      if (user) {
        toast('Bukan akun admin!', 'err');
        isLoggingOut = true;
        signOut(auth).finally(() => isLoggingOut = false);
      }
    }
  });

  // ── LOGIN ───────────────────────────────────────────────────
  $('btnLogin').addEventListener('click', async () => {
    const email = $('adminEmail').value.trim();
    const pass  = $('adminPass').value;
    const errEl = $('loginErr');
    errEl.textContent = '';

    if (!email || !pass) { errEl.textContent = 'Email dan password wajib diisi!'; return; }
    $('btnLogin').disabled = true;
    $('btnLogin').textContent = 'Masuk...';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      const map = {
        'auth/wrong-password':'Password salah!',
        'auth/user-not-found':'Email tidak terdaftar!',
        'auth/invalid-credential':'Email atau password salah!',
        'auth/too-many-requests':'Terlalu banyak percobaan. Coba lagi nanti.',
      };
      errEl.textContent = map[e.code] || e.message;
      $('btnLogin').disabled = false;
      $('btnLogin').textContent = 'Masuk sebagai Admin';
    }
  });
  document.addEventListener('keydown', e => { if(e.key==='Enter' && $('page-login').classList.contains('active')) $('btnLogin').click(); });

  // ── LOGOUT ──────────────────────────────────────────────────
  $('btn-logout').addEventListener('click', () => {
    if (confirm('Yakin mau logout?')) signOut(auth);
  });

  // ── LOAD USERS ──────────────────────────────────────────────
  window.loadUsers = async function() {
    const tbody = $('tabelUser');
    tbody.innerHTML = `<tr><td colspan="6" class="empty-row">Memuat data...</td></tr>`;
    try {
      const q    = query(collection(db,'toko'), orderBy('dibuatPada','desc'));
      const snap = await getDocs(q);
      let total=0, aktif=0, blokir=0, rows='', no=1;

      snap.forEach(ds => {
        const d=ds.data(), uid=ds.id;
        if (!d.email) return; // skip non-user docs
        total++;
        if (d.status==='blokir') blokir++;
        else aktif++;

        const base = window.location.origin + (window.location.hostname.includes('github.io') ? '/LINKify' : '');
        const linkToko = `${base}/index.html?uid=${uid}`;

        rows += `<tr>
          <td>${no++}</td>
          <td style="font-weight:600">${escHtml(d.namaToko)}</td>
          <td>${escHtml(d.pemilik||'-')}</td>
          <td style="color:#666;font-size:12px">${escHtml(d.email)}</td>
          <td><span class="badge ${d.status==='blokir'?'badge-red':'badge-green'}">${d.status==='blokir'?'Diblokir':'Aktif'}</span></td>
          <td>
            <a href="${linkToko}" target="_blank" class="act-link act-view">Lihat</a>
            ${d.status==='blokir'
              ? `<button onclick="ubahStatus('${uid}','aktif')" class="act-link act-aktif">Aktifkan</button>`
              : `<button onclick="ubahStatus('${uid}','blokir')" class="act-link act-blokir">Blokir</button>`}
            <button onclick="hapusUser('${uid}','${escHtml(d.namaToko)}')" class="act-link act-hapus">Hapus</button>
          </td>
        </tr>`;
      });

      $('st-total').textContent  = total;
      $('st-aktif').textContent  = aktif;
      $('st-blokir').textContent = blokir;
      tbody.innerHTML = rows || `<tr><td colspan="6" class="empty-row">Belum ada user terdaftar</td></tr>`;
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty-row" style="color:#EF4444">Gagal memuat: ${e.message}</td></tr>`;
    }
  };

  // ── DAFTARKAN USER ──────────────────────────────────────────
  $('btnDaftar').addEventListener('click', async () => {
    const nama    = $('in-nama').value.trim();
    const pemilik = $('in-pemilik').value.trim();
    const email   = $('in-email').value.trim();
    const pass    = $('in-pass').value;
    const btn     = $('btnDaftar');

    if (!nama||!pemilik||!email||!pass) return toast('Isi semua field terlebih dahulu!','warn');
    if (pass.length < 6) return toast('Password minimal 6 karakter!','warn');

    btn.disabled=true; btn.textContent='Mendaftarkan...';

    // Secondary app — admin tidak ikut logout
    const secName = 'sec-' + Date.now();
    const secApp  = initializeApp(CONFIG.firebase, secName);
    const secAuth = getAuth(secApp);
    try {
      const cred = await createUserWithEmailAndPassword(secAuth, email, pass);
      const uid  = cred.user.uid;
      await setDoc(doc(db,'toko',uid), {
        namaToko:   nama,
        pemilik:    pemilik,
        email:      email,
        status:     'aktif',
        dibuatPada: serverTimestamp()
      });
      toast(`User "${nama}" berhasil didaftarkan! ✅`);
      $('in-nama').value=$('in-pemilik').value=$('in-email').value=$('in-pass').value='';
      loadUsers();
    } catch(e) {
      const map = {
        'auth/email-already-in-use': 'Email sudah terdaftar!',
        'auth/invalid-email':        'Format email tidak valid!',
      };
      toast(map[e.code]||'Gagal: '+e.message, 'err');
    } finally {
      await signOut(secAuth).catch(()=>{});
      btn.disabled=false; btn.textContent='+ Daftarkan';
    }
  });

  // ── UBAH STATUS ─────────────────────────────────────────────
  window.ubahStatus = async (uid, status) => {
    if (!confirm(`Yakin mau ${status==='blokir'?'memblokir':'mengaktifkan'} user ini?`)) return;
    try {
      await updateDoc(doc(db,'toko',uid), { status });
      toast(status==='blokir' ? 'User diblokir' : 'User diaktifkan');
      loadUsers();
    } catch(e) { toast('Gagal: '+e.message,'err'); }
  };

  // ── HAPUS USER ──────────────────────────────────────────────
  window.hapusUser = async (uid, nama) => {
    if (!confirm(`Hapus toko "${nama}"?\n\nData Firestore akan dihapus. Akun Auth perlu dihapus manual di Firebase Console > Authentication.`)) return;
    try {
      await deleteDoc(doc(db,'toko',uid));
      toast(`Toko "${nama}" dihapus`);
      loadUsers();
    } catch(e) { toast('Gagal hapus: '+e.message,'err'); }
  };

  // ── HELPER ──────────────────────────────────────────────────
  function escHtml(s) {
    return s ? String(s).replace(/[&<>"']/g, m =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])) : '';
  }
</script>
</body>
</html>
