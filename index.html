    <!-- KATALOG -->

      <div class="sec-head">
        <span class="sec-label">Katalog Produk</span>
        <span class="section-line"></span>
      </div>
      <div id="productList" class="prod-grid">
        <div class="skel-box"><div class="skel" style="height:155px"></div><div style="padding:12px"><div class="skel" style="height:12px;width:75%;margin-bottom:8px;border-radius:4px"></div><div class="skel" style="height:20px;width:50%;border-radius:4px"></div></div></div>

  </a>

  <!-- THEME + SHARE SCRIPT -->
  <script>
    function setTheme(t) {
      const isWhite = t === 'white';
      document.body.setAttribute('data-theme', isWhite ? 'white' : '');
      localStorage.setItem('lf-theme', t);
      document.querySelectorAll('.theme-pill').forEach(p => p.classList.toggle('active', p.dataset.t===t));
      // FIX: sync html background color agar tidak ada celah putih/gelap saat scroll ke bawah
      document.documentElement.style.backgroundColor = isWhite ? '#f0f2ff' : '#0d0d1a';
      // Sync border logo
      const logoEl = document.querySelector('.logo-img');
      if (logoEl) logoEl.style.borderColor = isWhite ? '#e8ecfb' : '#0d0d1a';
    }
    const saved = localStorage.getItem('lf-theme') || 'dark';
    setTheme(saved);

    function shareLink() {
      const name = document.getElementById('storeName')?.textContent || 'Toko';
      if (navigator.share) { navigator.share({ title: name, url: location.href }); }
      else { navigator.clipboard.writeText(location.href).then(() => alert('Link disalin!')); }
    }

    // Scroll animations
    const obs = new IntersectionObserver(entries =>
      entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); }), { threshold: 0.08 });
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  </script>

  <script type="module" src="js/script.js"></script>
</body>
</html>
